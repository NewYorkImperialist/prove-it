# Fly.io config for Prove It! (Node + Socket.IO).
app = "proveit"
primary_region = "ewr"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  # always-on (no cold start) — the machine stays up so the admin board & first player don't wait on a boot.
  # to go back to scale-to-zero (~free, ~1-3s cold start), set auto_stop_machines = "stop" and min_machines_running = 0.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
